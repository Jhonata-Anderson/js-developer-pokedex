<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link href="/assets/img/favicon.ico" rel="icon" type="image/x-icon">

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;500;700&display=swap" rel="stylesheet">

    <!-- Nosso CSS -->
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/pokedex.css">
    <link rel="stylesheet" href="./assets/css/modal.css">
</head>

<body>
    
    <section class="content">
        <h1>Pokedex</h1>

        <ol id="pokemonList" class="pokemons">

            <!-- Listas de Pokemons -->

        </ol>

        <div class="pagination">
            <button id="loadMoreButton" type="button">
                Load More
            </button>
        </div>


    </section>

    <section id="pokemonModal" class="modal" onclick="closeModal()">
        <div id="modalCard" class="modal-card" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>

            <div id="modalHeader">
                <div class="header-info">
                    <h2 id="modalName"></h2>
                    <span id="modalNumber"></span>
                </div>
                <div id="modalTypes" class="types"></div>
                <img id="modalImage" src="" alt="Pokémon">
            </div>

            <div class="modal-body">
                <div class="stats-title">Base Stats</div>

                <div class="stats-container">
                    <div class="stat-row">
                        <span class="stat-label">HP</span>
                        <span id="statHp" class="stat-value"></span>
                        <div class="bar-bg"><div id="barHp" class="bar-fill"></div></div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Attack</span>
                        <span id="statAtk" class="stat-value"></span>
                        <div class="bar-bg"><div id="barAtk" class="bar-fill"></div></div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Defense</span>
                        <span id="statDef" class="stat-value"></span>
                        <div class="bar-bg"><div id="barDef" class="bar-fill"></div></div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Sp. Atk</span>
                        <span id="statSpAtk" class="stat-value"></span>
                        <div class="bar-bg"><div id="barSpAtk" class="bar-fill"></div></div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Sp. Def</span>
                        <span id="statSpDef" class="stat-value"></span>
                        <div class="bar-bg"><div id="barSpDef" class="bar-fill"></div></div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Speed</span>
                        <span id="statSpeed" class="stat-value"></span>
                        <div class="bar-bg"><div id="barSpeed" class="bar-fill"></div></div>
                    </div>
                </div>

                <div class="physical-info">
                    <div><small>Altura</small><strong id="modalHeight"></strong></div>
                    <div><small>Peso</small><strong id="modalWeight"></strong></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Nosso JS -->
    <script src="./assets/js/pokemon-model.js"></script>
    <script src="./assets/js/poke-api.js"></script>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/modal.js"></script>
</body>

</html>
